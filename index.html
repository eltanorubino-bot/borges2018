<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huéspedes — Borges 2018</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; background: #f5f5f7; min-height: 100vh; color: #1d1d1f; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    .modal { background: #fff; border-radius: 20px; padding: 48px 36px 36px; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,.18); }
    .modal-icon { width: 56px; height: 56px; background: #f5f5f7; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 24px; }
    .modal h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .modal p { color: #86868b; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
    .input-wrap { position: relative; margin-bottom: 16px; }
    .input-wrap input { width: 100%; padding: 14px 16px; border: 1.5px solid #d2d2d7; border-radius: 12px; font-size: 16px; outline: none; transition: border-color .2s; }
    .input-wrap input:focus { border-color: #0071e3; }
    .btn-primary { width: 100%; padding: 14px; background: #0071e3; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background .2s; }
    .btn-primary:hover { background: #0077ED; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .error-msg { color: #ff3b30; font-size: 13px; margin-top: 12px; min-height: 18px; }
    .app { display: none; }
    .header { background: #fff; border-bottom: 1px solid #e5e5e7; padding: 20px 24px; position: sticky; top: 0; z-index: 10; }
    .header-inner { max-width: 600px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header-meta { font-size: 12px; color: #86868b; margin-top: 2px; }
    .btn-logout { background: none; border: 1px solid #d2d2d7; border-radius: 8px; padding: 6px 14px; font-size: 13px; color: #86868b; cursor: pointer; transition: all .2s; }
    .btn-logout:hover { border-color: #86868b; color: #1d1d1f; }
    .content { max-width: 600px; margin: 0 auto; padding: 24px 16px 100px; }
    .section { margin-bottom: 32px; }
    .section-label { font-size: 13px; font-weight: 600; color: #86868b; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; padding-left: 4px; }
    .guest-card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); transition: transform .15s, box-shadow .15s; }
    .guest-card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    .guest-card.current { border-left: 4px solid #34c759; }
    .guest-name { font-size: 17px; font-weight: 600; margin-bottom: 12px; }
    .guest-dates { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .date-block { background: #f5f5f7; border-radius: 10px; padding: 10px; text-align: center; }
    .date-block label { display: block; font-size: 11px; color: #86868b; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; letter-spacing: .3px; }
    .date-block span { display: block; font-size: 14px; font-weight: 500; }
    .guest-notes { margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0; font-size: 13px; color: #86868b; }
    .empty-state { text-align: center; padding: 48px 24px; color: #86868b; }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: .5; }
    .empty-state h3 { font-size: 17px; font-weight: 600; color: #1d1d1f; margin-bottom: 4px; }
    .empty-state p { font-size: 14px; }
    .warning-banner { background: #fff3cd; border: 1px solid #ffc107; border-radius: 12px; padding: 12px 16px; font-size: 13px; color: #856404; margin-bottom: 20px; display: none; }
    .loading { text-align: center; padding: 40px; color: #86868b; }
    .spinner { width: 28px; height: 28px; border: 3px solid #e5e5e7; border-top-color: #0071e3; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { text-align: center; padding: 20px; font-size: 12px; color: #c7c7cc; }
  </style>
</head>
<body>
  <div id="authModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-icon">🔐</div>
      <h2>Acceso Restringido</h2>
      <p>Ingresá la contraseña para ver el calendario de huéspedes del edificio.</p>
      <div class="input-wrap">
        <input type="password" id="passwordInput" placeholder="Contraseña" autocomplete="off">
      </div>
      <button class="btn-primary" id="loginBtn" onclick="handleLogin()">Acceder</button>
      <div id="errorMsg" class="error-msg"></div>
    </div>
  </div>
  <div id="app" class="app">
    <div class="header">
      <div class="header-inner">
        <div>
          <h1>Huéspedes</h1>
          <div class="header-meta" id="lastUpdate">Cargando...</div>
        </div>
        <button class="btn-logout" onclick="logout()">Salir</button>
      </div>
    </div>
    <div class="content">
      <div id="warningBanner" class="warning-banner"></div>
      <div id="guestList">
        <div class="loading">
          <div class="spinner"></div>
          <p>Cargando huéspedes...</p>
        </div>
      </div>
    </div>
    <div class="footer">Borges 2018 — Actualización automática desde Booking.com</div>
  </div>
  <script src="app.js"></script>
</body>
</html>
